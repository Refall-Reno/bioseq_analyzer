<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioSeq Analyzer | Skrining Termofilik</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧬</text></svg>">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f6; /* Warna abu-abu lab yang bersih */
            color: #2c3e50;
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        .navbar {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); /* Nuansa biru gelap sains */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 1px;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace; /* Khusus untuk data DNA */
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .btn-biotech {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            font-weight: 600;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-biotech:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 239, 125, 0.4);
            color: white;
        }
        
        /* --- Kustomisasi Hover --- */
        .card-hover {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15) !important;
        }

        /* --- ANIMASI KUSTOM --- */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade {
            animation: fadeIn 1s ease-in-out;
        }
        .animate-slide-up {
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark py-3">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fa-solid fa-dna me-2"></i>BioSeq Analyzer</a>
            
            <span class="navbar-text text-light d-none d-md-block border border-info rounded-pill px-3 py-1" style="background-color: rgba(255,255,255,0.1);">
                <i class="fa-solid fa-user-astronaut text-info me-1"></i> Dev: <strong>Moreno Ardiansyah</strong>
            </span>

            <button class="btn btn-outline-light ms-3 rounded-circle" id="darkModeToggle" title="Toggle Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </nav>

    <div class="container mt-5 animate-slide-up">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center mt-5 mb-4 text-muted" style="font-size: 0.95rem;">
        <hr class="w-50 mx-auto mb-4 opacity-50">
        <p class="mb-1">&copy; 2026 BioSeq Analyzer Project.</p>
        <p>Crafted with <i class="fa-solid fa-heart text-danger mx-1"></i> by <strong>Moreno Ardiansyah</strong></p>
    </footer>

    <script>
        const toggleBtn = document.getElementById('darkModeToggle');
        const htmlElement = document.documentElement; 
        const icon = toggleBtn.querySelector('i');

        toggleBtn.addEventListener('click', () => {
            if (htmlElement.getAttribute('data-bs-theme') === 'dark') {
                htmlElement.setAttribute('data-bs-theme', 'light');
                icon.classList.replace('fa-sun', 'fa-moon');
                icon.classList.replace('text-warning', 'text-light');
            } else {
                htmlElement.setAttribute('data-bs-theme', 'dark');
                icon.classList.replace('fa-moon', 'fa-sun');
                icon.classList.remove('text-light');
                icon.classList.add('text-warning');
            }
        });
    </script>
</body>
</html>
