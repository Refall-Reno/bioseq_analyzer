<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioSeq Analyzer | Skrining Termofilik</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧬</text></svg>">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=3.0">

    <style>
        /* Sisa styling navbar biarkan di sini, tapi WARNA BODY KITA HAPUS */
        .navbar {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 1px;
        }
    </style>
</head>
<body id="bodyElement">

    <nav class="navbar navbar-expand-lg navbar-dark py-3">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fa-solid fa-dna me-2"></i>BioSeq Analyzer</a>
            
            <span class="navbar-text text-light d-none d-md-block border border-info rounded-pill px-3 py-1" style="background-color: rgba(255,255,255,0.1);">
                <i class="fa-solid fa-user-astronaut text-info me-1"></i> Dev: <strong>Moreno Ardiansyah</strong>
            </span>

            <button class="btn btn-outline-light ms-3 rounded-circle" id="darkModeToggle" title="Toggle Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </nav>

    <div class="container mt-5 animate-slide-up">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center mt-5 mb-4 text-muted" style="font-size: 0.9rem;">
        <hr class="w-50 mx-auto mb-4 opacity-50">
        <p class="mb-1">&copy; 2026 BioSeq Analyzer Project. All rights reserved.</p>
        <p>Developed by <strong>Moreno Ardiansyah</strong></p>
    </footer>

    <script>
        const toggleBtn = document.getElementById('darkModeToggle');
const htmlElement = document.documentElement; 
const bodyElement = document.getElementById('bodyElement');
const icon = toggleBtn.querySelector('i');

const setMode = (mode) => {
    if (mode === 'dark') {
        htmlElement.setAttribute('data-bs-theme', 'dark');
        bodyElement.classList.add('dark-mode');
        icon.classList.replace('fa-moon', 'fa-sun');
        icon.classList.add('text-warning');
    } else {
        htmlElement.setAttribute('data-bs-theme', 'light');
        bodyElement.classList.remove('dark-mode');
        icon.classList.replace('fa-sun', 'fa-moon');
        icon.classList.remove('text-warning');
    }
    localStorage.setItem('theme', mode);
}

const savedTheme = localStorage.getItem('theme') || 'light';
setMode(savedTheme);

toggleBtn.addEventListener('click', () => {
    const currentMode = htmlElement.getAttribute('data-bs-theme');
    setMode(currentMode === 'dark' ? 'light' : 'dark');
});
    </script>
</body>
</html>
