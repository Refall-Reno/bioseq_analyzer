<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioSeq Analyzer | Skrining Termofilik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f6; /* Warna abu-abu lab yang bersih */
            color: #2c3e50;
        }
        .navbar {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); /* Nuansa biru gelap sains */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 1px;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace; /* Khusus untuk data DNA */
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .btn-biotech {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            font-weight: 600;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-biotech:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 239, 125, 0.4);
            color: white;
        }
        /* --- ANIMASI KUSTOM --- */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Kelas Ajaib yang akan kita pasang di HTML */
        .animate-fade {
            animation: fadeIn 1s ease-in-out;
        }
        .animate-slide-up {
            opacity: 0; /* Disembunyikan dulu sebelum animasi mulai */
            animation: slideUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        
        /* Delay agar munculnya berurutan (Staggered effect) */
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark py-3">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fa-solid fa-dna me-2"></i>BioSeq Analyzer</a>
            <span class="navbar-text text-light opacity-75 d-none d-md-block">
                <i class="fa-solid fa-microscope me-1"></i> Pipeline Identifikasi Termofilik
            </span>
        </div>
    </nav>

    <div class="container mt-5">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center mt-5 mb-3 text-muted" style="font-size: 0.9rem;">
        <p>&copy; 2026 BioSeq Analyzer Project. Menganalisis sekuesensi dengan presisi.</p>
    </footer>
</body>
</html>
