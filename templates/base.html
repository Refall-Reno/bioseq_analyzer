<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI0SE-Q AN4LYZER | Advanced Thermophilic Skrining Pipeline | Refall-Reno</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧬</text></svg>">

    <style>
        :root {
            --bg-base: #061218; /* Black teal base like target image */
            --bg-panel: rgba(16, 26, 32, 0.8); /* Glass effect */
            --accent-main: #00f1d4; /* Neon Cyan like target image */
            --accent-glow: 0 0 10px rgba(0, 241, 212, 0.5);
            --text-main: #ffffff;
            --text-mono: #50e3c2;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            position: relative;
            min-height: 100vh;
        }

        /* Subtle background particle effect (inspired by target image) */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, rgba(0, 241, 212, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .navbar {
            background-color: var(--bg-panel) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 241, 212, 0.2);
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        
        .navbar-brand {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: var(--accent-main) !important;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: var(--accent-glow);
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-mono);
        }

        /* GLASSMORPHISM PANELS (Inspired by image panes) */
        .sci-fi-panel {
            background-color: var(--bg-panel);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 241, 212, 0.2);
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0, 241, 212, 0.1);
            transition: all 0.3s ease;
        }
        
        .sci-fi-panel:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 241, 212, 0.5);
            box-shadow: 0 0 25px rgba(0, 241, 212, 0.2);
        }

        .sci-fi-title {
            font-family: 'Orbitron', sans-serif;
            color: var(--accent-main);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-shadow: var(--accent-glow);
        }

        .btn-biotech {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: #000;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            border: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 5px rgba(56, 239, 125, 0.4);
        }
        
        .btn-biotech:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 0 20px rgba(56, 239, 125, 0.6);
            color: #000;
        }

        /* --- ANIMASI KUSTOM --- */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 1s ease-in-out; }
        .animate-slide-up { animation: slideUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg py-3">
        <div class="container-fluid px-5">
            <a class="navbar-brand" href="/">BI0SE-Q AN4LYZER</a>
            
            <div class="d-flex align-items-center font-mono">
                <span class="me-3 opacity-75">SPECIMEN: ENV. SAMPLE</span>
                <span class="d-none d-md-block border border-info rounded-pill px-3 py-1" style="background-color: rgba(0, 241, 212, 0.1);">
                    <i class="fa-solid fa-code text-info me-1"></i> DEV_REFALL_RENO
                </span>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-5 mt-5">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center mt-5 mb-4 text-muted font-mono" style="font-size: 0.8rem; opacity: 0.5;">
        <hr class="w-25 mx-auto mb-3 opacity-25">
        <p>&copy; 2026 BI0SE-Q AN4LYZER PROJECT. AUTHORED_BY_MORENO_ARDIANSYAH.</p>
    </footer>

</body>
</html>
