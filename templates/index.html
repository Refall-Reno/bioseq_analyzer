{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center animate-slide-up">
    <div class="col-lg-8">
        <div class="card border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="d-inline-block bg-light rounded-circle p-4 mb-3 shadow-sm">
                        <i class="fa-solid fa-vial text-info fa-3x"></i>
                    </div>
                    <h2 class="fw-bold" style="color: #2c5364;">Skrining Kandidat Termofilik</h2>
                    <p class="text-muted">Sistem akan memproses data sekuens dari sampel lingkungan (format `.fasta` / `.fastq`), menghitung komposisi nukleotida, dan memfilter berdasarkan stabilitas <strong>GC Content</strong> tertinggi.</p>
                </div>
                
                <form action="/" method="POST" enctype="multipart/form-data" class="mt-4">
                    <div class="upload-zone border border-2 border-primary border-opacity-25 rounded-3 p-4 text-center bg-light mb-4" style="border-style: dashed !important;">
                        <i class="fa-solid fa-cloud-arrow-up text-primary opacity-50 fa-2x mb-2"></i>
                        <h6 class="fw-bold text-secondary">Pilih File Sekuens Anda</h6>
                        <input class="form-control mt-3" type="file" name="file" accept=".fasta,.fas,.txt,.fastq" required>
                    </div>
                    <button type="submit" class="btn btn-biotech btn-lg w-100 rounded-pill py-3">
                        <i class="fa-solid fa-gears me-2"></i> Jalankan Pipeline Analisis
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
